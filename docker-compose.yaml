version: '3'
services:
  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    volumes:
      - database-data:/var/lib/postgresql/data/
    ports:
      - '${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}'
    networks:
      - local

  redis:
    image: 'redis:alpine'
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 3gb --maxmemory-policy allkeys-lru
    environment:
      - REDIS_DISABLE_COMMANDS=FLUSHDB,FLUSHALL
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - '${REDIS_PORT:-6379}:${REDIS_PORT:-6379}'
    volumes:
      - 'redis_data:/data'
    networks:
      - local

  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - /usr/src/app/node_modules
    ports:
      - '${PORT:-3000}:${PORT:-3000}'
    depends_on:
      - redis
      - db
    networks:
      - local
    env_file:
      - .env

volumes:
  redis_data:
    driver: local
  database-data:

networks:
  local:
